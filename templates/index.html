<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Our Story 💖</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;

            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            position: relative;
            transition: background 1s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        /* dark overlay */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;

            background: rgba(255,255,255,0.95);
            width: 90%;
            max-width: 360px;

            padding: 25px;
            border-radius: 18px;

            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #444;
            font-size: 15px;
        }

        button {
            margin-top: 15px;
            width: 100%;

            padding: 12px;
            border: none;
            border-radius: 12px;

            background: #ff4d6d;
            color: white;
            font-size: 16px;

            cursor: pointer;
        }

        .screen {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s ease;
        }

        .active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }

        /* 📊 analytics box */
        .stats {
            margin-top: 15px;
            font-size: 13px;
            color: #666;
            padding-top: 10px;
            border-top: 1px solid #ddd;
        }
    </style>
</head>

<body>

<div class="card">

    <!-- 🎬 SCREEN 1 -->
    <div id="s1" class="screen active">
        <h1>Hi Vienna 💖</h1>
        <p>This is our little story...</p>
        <button onclick="next(2)">Start ▶️</button>
    </div>

    <!-- 🎬 SCREEN 2 -->
    <div id="s2" class="screen">
        <h1>Feeling 💌</h1>
        <p>You became my calm in chaos.</p>
        <button onclick="next(3)">Continue ➡️</button>
    </div>

    <!-- 🎬 SCREEN 3 -->
    <div id="s3" class="screen">
        <h1>Memory 💭</h1>
        <p>Some moments stay forever.</p>

        <audio id="music" controls>
            <source src="/static/veeomosh.mp3" type="audio/mpeg">
        </audio>

        <button onclick="playMusic(); next(4)">Next ➡️</button>
    </div>

    <!-- 🎬 SCREEN 4 -->
    <div id="s4" class="screen">
        <h1>Final ❤️</h1>
        <p>I just need you in my story.</p>
        <button onclick="next(1)">Replay 🔁</button>

    </div>

</div>

<script>
    const backgrounds = {
        1: "url('/static/screen1.jpg')",
        2: "url('/static/screen2.jpg')",
        3: "url('/static/screen3.jpg')",
        4: "url('/static/screen4.jpg')"
    };

    let musicStarted = false;
    document.body.style.background = backgrounds[1];

    function next(n) {
        for (let i = 1; i <= 4; i++) {
            document.getElementById("s" + i).classList.remove("active");
        }

        document.getElementById("s" + n).classList.add("active");

        document.body.style.background = backgrounds[n];
    }

    function playMusic() {
        if (!musicStarted) {
            const music = document.getElementById("music");
            music.play().catch(() => {});
            musicStarted = true;
        }
    }
</script>

</body>
</html>
